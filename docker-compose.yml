services:
  db:
    image: postgis/postgis:18-3.6
    platform: linux/amd64
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1536M

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  api:
    build:
      context: .
      dockerfile: cmd/api/Dockerfile
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  auditor:
    build:
      context: .
      dockerfile: cmd/auditor/Dockerfile
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - AUDIT_MODEL=${AUDIT_MODEL:-deepseek-r1:1.5b}
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
      api:
        condition: service_started

volumes:
  postgres_data:
  ollama_data: